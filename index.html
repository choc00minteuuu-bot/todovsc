<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TO-DOs</title>

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
</head>

<body>
    <div class="header"> 
        <span class="icon"> ⭐ </span>
        <h1>TO-DOs !</h1>
        <span class="icon"> 🗑️ </span>
    </div>

    <div class="searchbar">
        <input type="text" placeholder="Search for a task TO-DO">
        <span> 🔍 </span>
    </div>

    <div class="todo list">
        <div class="todo items">
            <input type="checkbox">
            <h3> task 1 </h3>
            <p> this is a description of task 1 </p>
        </div>
        <span class="star"> ⭐ </span>

        <div class="todo items">
            <input type="checkbox">
            <h3> task 2 </h3>
            <p> this is a description of task 2 </p>
        </div>
        <span class="star"> ⭐ </span>

        <div class="todo items">
            <input type="checkbox">
            <h3> task 3 </h3>
            <p> this is a description of task 3 </p>
        </div>
        <span class="star"> ⭐ </span>
    </div>
    
    <div class="add btn"> ➕ </div>

    <script src="script.js"></script>
</body>
</html>
