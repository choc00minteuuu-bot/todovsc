<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TO-DOs</title>

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
</head>

<body>
    <div class="header"> 
        <span class="icon"> ⭐ </span>
        <h1>TO-DOs !</h1>
        <span class="icon"> 🗑️ </span>
    </div>

    <div class="addTask">
        <input id="taskInput" type="text" placeholder="add task">
        <button id="addBtn">➕</button>  <br>
        <h6><font color="#383385">add a new task</font></h6>
    </div>

    <div class="searchbar"> 
        <input type="text" placeholder="Search for a task TO-DO"> 
        <span> 🔍 </span> 
    </div>
    
    <div id="list">
        <div class="item">
            <input type="checkbox">
            <h3><b> task 1 </b></h3>  <br>
            <h5> this is a description of task 1 </h5>
        </div>
        <span class="star"> ⭐ </span>

        <div class="item">
            <input type="checkbox">
            <h3><b> task 2 </b></h3>  <br>
            <h5> this is a description of task 2 </h5>
        </div>
        <span class="star"> ⭐ </span>

        <div class="item">
            <input type="checkbox">
            <h3><b> task 3 </b></h3>  <br>
            <h5> this is a description of task 3 </h5>
        </div>
        <span class="star"> ⭐ </span>
    </div>
    
    <div class="addBtn2"> ➕ </div>

    <script src="script.js"></script>
</body>
</html>
